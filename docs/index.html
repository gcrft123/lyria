<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lyria</title>
	<style>
		:root { color-scheme: dark; }
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
			background: #000;
			color: #fff;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 2rem;
		}
		.wrap { max-width: 32rem; }
		.pill {
			width: 140px; height: 38px;
			margin: 0 auto 2.5rem;
			background: #111;
			border-radius: 19px;
			box-shadow: 0 0 40px rgba(120, 110, 250, 0.25);
		}
		h1 { font-size: 2.5rem; font-weight: 600; letter-spacing: -0.02em; }
		p.tagline { margin-top: 0.75rem; color: rgba(255,255,255,0.6); font-size: 1.05rem; }
		a.download {
			display: inline-block;
			margin-top: 2.5rem;
			padding: 0.75rem 1.75rem;
			background: #fff;
			color: #000;
			text-decoration: none;
			border-radius: 12px;
			font-weight: 600;
		}
		p.note { margin-top: 1.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.35); }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="pill"></div>
		<h1>Lyria</h1>
		<p class="tagline">A living island for your Mac — music, calendar, weather, timers, and more, right at the notch.</p>
		<a class="download" href="https://github.com/gcrft123/lyria/releases/latest">Download for macOS</a>
		<p class="note">Apple Silicon · macOS 13+ · auto-updates via Sparkle</p>
	</div>
</body>
</html>
